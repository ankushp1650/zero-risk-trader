# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ZeroRiskTrader

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://mcr.microsoft.com/
        username: ${{ secrets.AzureAppService_ContainerUsername_31d6ba02655f4601880dfa6aaaeded57 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_b9650815572e4aa8a6013d1ce74f5b5f }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: mcr.microsoft.com/${{ secrets.AzureAppService_ContainerUsername_31d6ba02655f4601880dfa6aaaeded57 }}/appsvc/staticsite:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ZeroRiskTrader'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_66e5e2b341874ba3b8b3453ee2d50c51 }}
        images: 'mcr.microsoft.com/${{ secrets.AzureAppService_ContainerUsername_31d6ba02655f4601880dfa6aaaeded57 }}/appsvc/staticsite:${{ github.sha }}'